<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniGoAgent</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#f0f0f5;height:100vh;display:flex;flex-direction:column}
#header{background:#1a1a2e;color:#fff;padding:14px 20px;font-size:16px;font-weight:600;flex-shrink:0}
#messages{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:80%;padding:10px 14px;border-radius:12px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.user{background:#007aff;color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.agent{background:#fff;color:#222;align-self:flex-start;border-bottom-left-radius:4px;box-shadow:0 1px 2px rgba(0,0,0,.08)}
.agent pre{background:#f5f5f5;padding:8px;border-radius:6px;overflow-x:auto;margin:6px 0}
.agent code{font-size:13px}
#img-preview{display:none;padding:8px 20px;background:#fff;border-top:1px solid #ddd}
#img-preview img{max-height:120px;border-radius:8px;border:1px solid #ddd}
#input-area{display:flex;padding:10px 16px;background:#fff;border-top:1px solid #ddd;flex-shrink:0;gap:8px;align-items:flex-end}
#input{flex:1;border:1px solid #ddd;border-radius:20px;padding:10px 16px;font-size:14px;outline:none;resize:none;max-height:120px;line-height:1.4}
#input:focus{border-color:#007aff}
#send-btn{background:#007aff;color:#fff;border:none;border-radius:20px;padding:10px 20px;font-size:14px;cursor:pointer;white-space:nowrap}
#send-btn:disabled{opacity:.5;cursor:default}
#paste-hint{font-size:11px;color:#999;padding:2px 16px 6px;background:#fff;flex-shrink:0}
.loading{color:#999;font-style:italic}
.stats{font-size:11px;color:#888;padding:4px 0 0;border-top:1px solid #eee;margin-top:6px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
</style>
</head>
<body>
<div id="header">MiniGoAgent</div>
<div id="messages"></div>
<div id="img-preview"><img id="preview-img" src=""><span style="font-size:12px;color:#999;margin-left:8px" id="preview-name"></span></div>
<div id="input-area">
  <textarea id="input" rows="1" placeholder="输入消息... (Ctrl+V 粘贴图片)"></textarea>
  <button id="send-btn" onclick="send()">发送</button>
</div>
<div id="paste-hint">支持粘贴图片</div>

<script>
let pendingImage = null

const input = document.getElementById('input')
input.addEventListener('input', () => {
  input.style.height = 'auto'
  input.style.height = Math.min(input.scrollHeight, 120) + 'px'
})
input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send() } })

input.addEventListener('paste', e => {
  const items = e.clipboardData.items
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault()
      const file = item.getAsFile()
      const reader = new FileReader()
      reader.onload = () => {
        pendingImage = reader.result
        document.getElementById('preview-img').src = pendingImage
        document.getElementById('preview-name').textContent = file.name || '粘贴的图片'
        document.getElementById('img-preview').style.display = 'flex'
      }
      reader.readAsDataURL(file)
      return
    }
  }
})

function addMsg(text, cls) {
  const div = document.createElement('div')
  div.className = 'msg ' + cls
  div.textContent = text
  document.getElementById('messages').appendChild(div)
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight
}

function addHTML(html, cls) {
  const div = document.createElement('div')
  div.className = 'msg ' + cls
  div.innerHTML = html
  document.getElementById('messages').appendChild(div)
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight
}

async function send() {
  const text = input.value.trim()
  if (!text && !pendingImage) return

  const btn = document.getElementById('send-btn')
  btn.disabled = true

  if (pendingImage) {
    addMsg('[图片] ' + text || '描述这张图片', 'user')
    document.getElementById('img-preview').style.display = 'none'
    const img = pendingImage
    pendingImage = null
    document.getElementById('preview-img').src = ''

    const loading = document.createElement('div')
    loading.className = 'msg agent loading'
    loading.textContent = '分析图片中...'
    document.getElementById('messages').appendChild(loading)

    try {
      const res = await fetch('/api/vision', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({image: img, prompt: text || '描述这张图片'})
      })
      const data = await res.json()
      loading.remove()
      const bubble = document.createElement('div')
      bubble.className = 'msg agent'
      bubble.innerHTML = marked(data.reply)
      if (data.stats) {
        const s = data.stats
        const statsDiv = document.createElement('div')
        statsDiv.className = 'stats'
        statsDiv.innerHTML = '<span>' + s.duration + '</span><span>' + s.model + '</span>'
        if (s.in_tokens_h) statsDiv.innerHTML += '<span>\u2191' + s.in_tokens_h + '</span>'
        if (s.out_tokens_h) statsDiv.innerHTML += '<span>\u2193' + s.out_tokens_h + '</span>'
        if (s.ctx_max_h) statsDiv.innerHTML += '<span>ctx ' + s.in_tokens_h + '/' + s.ctx_max_h + ' ' + s.ctx_pct + '</span>'
        bubble.appendChild(statsDiv)
      }
      document.getElementById('messages').appendChild(bubble)
    } catch (e) {
      loading.remove()
      addMsg('请求失败: ' + e.message, 'agent')
    }
  } else {
    addMsg(text, 'user')
    input.value = ''
    input.style.height = 'auto'

    const bubble = document.createElement('div')
    bubble.className = 'msg agent'
    document.getElementById('messages').appendChild(bubble)

    try {
      const res = await fetch('/api/chat/stream', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({message: text})
      })
      const reader = res.body.getReader()
      const decoder = new TextDecoder()
      let buffer = ''
      let full = ''
      while (true) {
        const {done, value} = await reader.read()
        if (done) break
        buffer += decoder.decode(value, {stream: true})
        const parts = buffer.split('\n\n')
        buffer = parts.pop()
        for (const part of parts) {
          for (const line of part.split('\n')) {
            if (line.startsWith('data: ')) {
              const data = line.slice(6)
              if (data === '[DONE]') { break }
              try {
                const parsed = JSON.parse(data)
                if (parsed.content) {
                  full += parsed.content
                  bubble.innerHTML = marked(full)
                  const existingStats = bubble.querySelector('.stats')
                  if (existingStats) existingStats.remove()
                } else if (parsed.stats) {
                  const old = bubble.querySelector('.stats')
                  if (old) old.remove()
                  const statsDiv = document.createElement('div')
                  statsDiv.className = 'stats'
                  const s = parsed.stats
                  statsDiv.innerHTML = '<span>' + s.duration + '</span><span>' + s.model + '</span>'
                  if (s.in_tokens_h) statsDiv.innerHTML += '<span>\u2191' + s.in_tokens_h + '</span>'
                  if (s.out_tokens_h) statsDiv.innerHTML += '<span>\u2193' + s.out_tokens_h + '</span>'
                  if (s.ctx_max_h) statsDiv.innerHTML += '<span>ctx ' + s.in_tokens_h + '/' + s.ctx_max_h + ' ' + s.ctx_pct + '</span>'
                  bubble.appendChild(statsDiv)
                } else if (parsed.error) {
                  bubble.textContent = '错误: ' + parsed.error
                }
              } catch(e) {}
            }
          }
        }
        document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight
      }
      if (!full) { bubble.textContent = '（空回复）' }
    } catch (e) {
      bubble.textContent = '请求失败: ' + e.message
    }
  }

  btn.disabled = false
}

function marked(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')
    .replace(/\n/g, '<br>')
}
</script>
</body>
</html>
